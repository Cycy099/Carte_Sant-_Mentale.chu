<head>

    <title>Répertoire Santé Mentale Liège</title>

    <style>
        :root { --liege: #e67e22; --verviers: #27ae60; --huy: #2980b9; --waremme: #8e44ad; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; overflow: hidden; }
        #map { flex: 1; height: 100vh; }
        #sidebar { width: 420px; background: white; border-left: 5px solid #2c3e50; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.1); }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .filter-section { padding: 10px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        #content { padding: 15px; overflow-y: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .btn-mode { flex:1; padding:8px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; color:white; font-size:0.75rem; transition: 0.2s; }
        .btn-sub { font-size:0.7rem; border:1px solid #ccc; background:white; cursor:pointer; padding:5px; border-radius:4px; margin: 2px; }
        .btn-reset { width: 90%; margin: 10px auto; padding: 8px; background: #34495e; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .urgences-block { background: #fff3f3; border: 2px solid #e74c3c; border-radius: 8px; margin: 10px; padding: 10px; }
        .urgence-item { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 3px; border-bottom: 1px dashed #fab1a0; }
        .urgence-num { font-weight: bold; color: #d63031; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 12px; width: 85%; max-width: 500px; position: relative; max-height: 80vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #aaa; }
	.menu-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease-in-out;
    background: white;
}

/* Quand on ajoute cette classe en JS, le menu descend */
.menu-open {
    max-height: 600px; /* Assez grand pour tout le contenu */
}

/* Rotation de la flèche */
.arrow-rotate {
    transform: rotate(180deg);
}
    </style>
</head>

<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // --- 1. INITIALISATION CARTE ---
    var map = L.map('map').setView([50.55, 5.65], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var markersGroup = L.layerGroup().addTo(map);
    var currentArrondissement = "";

    // --- 2. BARRE DE RECHERCHE ---
    var geocoder = L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "Rechercher une adresse...",
        errorMessage: "Adresse introuvable."
    }).on('markgeocode', function(e) {
        var latlng = e.geocode.center;
        L.marker(latlng).addTo(map).bindPopup("<b>Recherche :</b><br>" + e.geocode.name).openPopup();
        map.setView(latlng, 15);
    }).addTo(map);

    // --- 3. FONCTION CAMEMBERT ---
    function createDonutIcon(types) {
        var colorMap = {
            "HOSP": "#e74c3c", "HOSP_SEMI": "#3498db", "SSM": "#27ae60",
            "ASSU": "#f1c40f", "REINSER": "#9C6DA5",
            "MSP": "#FF00FF", "IHP": "#FF8C00"
        };
        if (!Array.isArray(types)) types = [types];
        var sliceAngle = 360 / types.length;
        var gradientSteps = [];
        var currentAngle = 0;
        types.forEach(function(t) {
            var color = colorMap[t] || "#95a5a6";
            gradientSteps.push(`${color} ${currentAngle}deg ${currentAngle + sliceAngle}deg`);
            currentAngle += sliceAngle;
        });
        return L.divIcon({
            className: 'custom-donut-icon',
            html: `<div style="width:18px; height:18px; border-radius:50%; background:conic-gradient(${gradientSteps.join(', ')}); border:2px solid white; box-shadow:0 0 4px rgba(0,0,0,0.4);"></div>`,
            iconSize: [22, 22], iconAnchor: [11, 11]
        });
    }

    // --- 4. MODALE & FILTRES ---
    function openDetails(nomEtablissement) {
    var s = databaseTotale.find(item => item.nom === nomEtablissement);
    
    // 2. On vérifie si 's' existe AVEC une accolade {
    if (s) {
        // On définit le contenu de la section Services (Gestion des sauts de ligne incluse)
        var rawServices = s.services || s.missions || "Accompagnement et soins.";
        var servicesContent = rawServices.replace(/\n/g, '<br>');
        
        // On définit le contenu de l'admission
        var rawAdmis = s.admis || s.admission || "Contacter l'établissement pour la procédure.";
        var admissionContent = rawAdmis.replace(/\n/g, '<br>');

    document.getElementById('modalBody').innerHTML = `
        <h2>${s.nom}</h2>
        <p><strong>📍 Adresse :</strong> ${s.adr}</p>
        <p><strong>📞 Tel :</strong> ${s.tel}</p>
        <p><strong>🌍 Territoire :</strong> ${s.territoire || "Province de Liège"}</p>
        <hr>
        <p><strong>Description :</strong> ${s.desc || "Information non renseignée."}</p>
        
        <p><strong>Services :</strong><br>${servicesContent.replace(/\n/g, '<br>')}</p>
        
        <p><strong>Admission :</strong><br>${admissionContent}</p>
        
        <button onclick="closeModal()" style="width:100%; padding:12px; margin-top:10px; background:#2c3e50; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">RETOUR</button>
    `;
    document.getElementById('infoModal').style.display = "block";
    } else {
            console.error("Établissement non trouvé : " + nomEtablissement);
    }
}
function voirGroupe(id) {
    if (!id) return;
    var g = groupesData[id];
    
    if (g) {
        // 1. Récupération des données
        var descText = g.description || g.desc || "";
        var servText = g.services || "";
        var admisText = g.admis || g.admission || "";

        // 2. Construction du HTML
        var htmlContent = `<h2 style="color:#e67e22; margin-bottom:15px;">${g.nom}</h2>`;
        
        // Adresse et Téléphone
        if (g.adr) htmlContent += `<p><strong>📍 Adresse :</strong> ${g.adr}</p>`;
        if (g.tel) htmlContent += `<p><strong>📞 Tel :</strong> ${g.tel}</p>`;

        // Section Description
        if (descText) {
            htmlContent += `
                <div style="margin-top:15px; border-bottom: 1px solid #ddd; padding-bottom:10px;">
                    <p><strong>Description :</strong><br>${descText.replace(/\n/g, '<br>')}</p>
                </div>`;
        }

        // Section Services (Le bloc gris/orange)
        if (servText) {
            htmlContent += `
                <div style="background:#f4f7f6; padding:15px; border-radius:8px; border-left:4px solid #e67e22; margin-top:15px;">
                    <p style="margin:0;"><strong>Services et Missions :</strong><br>
                    ${servText.replace(/\n/g, '<br>')}
                    </p>
                </div>`;
        }

        // Section Admission (C'est celle-ci qu'il manquait !)
        if (admisText) {
            htmlContent += `
                <div style="margin-top:15px; padding:10px; border:1px dashed #e67e22; border-radius:5px;">
                    <p style="margin:0;"><strong>✅ Admission :</strong><br>
                    ${admisText.replace(/\n/g, '<br>')}
                    </p>
                </div>`;
        }

        // Bouton Retour
        htmlContent += `<button onclick="closeModal()" style="width:100%; padding:12px; margin-top:20px; background:#2c3e50; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">RETOUR</button>`;

        // 3. Affichage
        document.getElementById('modalBody').innerHTML = htmlContent;
        document.getElementById('infoModal').style.display = "block";
        document.getElementById('groupesSoutien').value = ""; 
    }
}
function toggleMenu() {
    var menu = document.getElementById("filter-menu");
    var arrow = document.getElementById("filter-arrow");
    
    menu.classList.toggle("menu-open");
    arrow.classList.toggle("arrow-rotate");
}
    function closeModal() { document.getElementById('infoModal').style.display = "none"; }

    function setMode(mode) {
    if (!currentArrondissement) { 
        alert("Veuillez d'abord sélectionner une zone sur la carte."); 
        return; 
    }
    var menu = document.getElementById("filter-menu");
    if (menu.classList.contains("menu-open")) {
        toggleMenu();
    }
    markersGroup.clearLayers();
    var tbodyHtml = "";
    
    // IMPORTANT : On utilise databaseTotale ici
    var filteredData = databaseTotale.filter(function(s) {
        if (s.arr !== currentArrondissement) return false;
        var types = Array.isArray(s.type) ? s.type : [s.type];
        if (mode === 'tout') return true;
        if (mode === 'liaison') return (types.includes('IHP') || types.includes('REINSER') || types.includes('MSP') || types.includes('ASSU'));
        if (mode === 'urgence') return (types.includes('HOSP') || types.includes('HOSP_SEMI') || types.includes('ASSU'));
        return types.includes(mode);
    });

    filteredData.forEach(function(s) {
        var types = Array.isArray(s.type) ? s.type : [s.type];
        
        // Création des badges de couleur
        var badges = types.map(t => {
            var c = {
                "HOSP":"#e74c3c","HOSP_SEMI":"#3498db","SSM":"#27ae60",
                "ASSU":"#f1c40f","REINSER":"#9C6DA5",
                "MSP":"#FF00FF","IHP":"#FF8C00"
            }[t] || "#95a5a6";
            return `<span style="background:${c}; color:white; padding:2px 4px; border-radius:3px; font-weight:bold; font-size:0.65rem; margin-right:2px;">${t}</span>`;
        }).join('');

        // Sécurisation du nom pour le JavaScript (gestion des apostrophes comme dans L'Accueil)
        var safeNom = s.nom.replace(/'/g, "\\'");

        // 1. Ajout à la liste latérale
        tbodyHtml += `<tr>
            <td>${badges}<br><b>${s.com}</b></td>
            <td>${s.nom}</td>
            <td><button onclick="openDetails('${safeNom}')" style="padding:4px 8px; cursor:pointer; background:#2c3e50; color:white; border:none; border-radius:4px;">Fiche</button></td>
        </tr>`;
        
        // 2. Ajout du marqueur sur la carte
        L.marker([s.lat, s.lng], { icon: createDonutIcon(s.type) })
            .addTo(markersGroup)
            .bindPopup(`
                <div style="text-align:center;">
                    <b style="font-size:1.1rem;">${s.nom}</b><br>
                    <p style="font-size:0.85rem; margin:5px 0;">${s.com}</p>
                    <button onclick="openDetails('${safeNom}')" style="background:#2c3e50; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">Voir la fiche complète</button>
                </div>
            `);
    });

    // Mise à jour de l'affichage
    document.getElementById('content').innerHTML = `
        <h3 style="border-bottom:2px solid #2c3e50; padding-bottom:5px;">${currentArrondissement}</h3>
        <table>${tbodyHtml || "<tr><td>Aucun service trouvé pour ce filtre.</td></tr>"}</table>
    `;
}

    });

    window.onclick = function(e) { if (e.target == document.getElementById('infoModal')) closeModal(); }
</script>
